server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://localhost:5433/hms_platform
    username: postgres
    password: ${POSTGRES_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    secret: ${security.jwt.secret}
    expiration: 86400000

  password:
    minimum-length: 12
    maximum-length: 64
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-character: true
    history-size: 5
    expiry-days: 90
    history-count: 5

  account:
    max-failed-attempts: 5
    lock-duration-minutes: 30

  lock:
    scheduler: 60000
