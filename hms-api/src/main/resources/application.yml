server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://localhost:5433/hms_platform
    username: postgres
    password: ${POSTGRES_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    secret: ${JWT_SECRET_KEY:mySuperSecretDefaultKeyWithAtLeast256Bits}
    expiration: 86400000

